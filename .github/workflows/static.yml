name: Implantar conteúdo estático no Pages

on:
  # Aciona quando um dos outros workflows termina
  workflow_run:
    workflows: ["Regenerar manualmente o HTML", "Executar o processo completo"]
    types:
      - completed
  
  # Mantém a opção de rodar manualmente se precisar
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    # SÓ executa se o workflow anterior terminou com SUCESSO
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
