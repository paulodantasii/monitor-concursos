name: Execução diária principal

on:
  schedule:
    - cron: "0 4 * * *"  # 1h de Brasília (UTC-3) / 1am Brasília time (UTC-3)
  workflow_dispatch:  # Permite execução manual / Allows manual execution

jobs:
  coletar:  # Coleta, analisa e publica o relatório / Collect, analyze and publish the report
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Necessário para fazer commit / Required to commit

    steps:
      - name: Baixar repositório / Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Python / Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Instalar dependências / Install dependencies
        run: pip install -r requirements.txt

      - name: Executar scraper / Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper.py

      - name: Salvar logs como artifact / Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_id }}
          path: run.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Salvar resultados / Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database.json new_links.txt new_relevant.txt report.html history/
          git diff --cached --quiet || git commit -m "auto: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
