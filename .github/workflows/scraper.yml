name: Coletor de Links de Concursos

on:
  schedule:
    - cron: "0 5 * * *"  # 2h de Brasília (UTC-3)
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Executar o scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python scraper.py

      - name: Commitar resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database.json novos_links.txt novos_relevantes.txt relatorio.html
          git diff --cached --quiet || git commit -m "auto: atualização $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
