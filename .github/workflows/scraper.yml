name: Coletor de Links de Concursos

on:
  schedule:
    # Toda dia às 4h (horário UTC = 1h a menos que Brasília no horário de verão,
    # ou 3h a menos no horário padrão). Ajuste abaixo se quiser outro horário.
    # Para 4h de Brasília (UTC-3): use "0 7 * * *"
    - cron: "0 7 * * *"

  # Permite rodar manualmente pelo botão na interface do GitHub
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # necessário para commitar de volta ao repositório

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Executar o scraper
        run: python scraper.py

      - name: Commitar resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database.json novos_links.txt
          # Só commita se houver mudança real
          git diff --cached --quiet || git commit -m "auto: atualização $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
