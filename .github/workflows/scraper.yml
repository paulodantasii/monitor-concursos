name: CuradorIA de Carreiras Jurídicas

on:
  schedule:
    - cron: "0 4 * * *"  # 1h de Brasília (UTC-3)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 trafilatura

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database.json new_links.txt new_relevant.txt report.html
          git diff --cached --quiet || git commit -m "auto: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push