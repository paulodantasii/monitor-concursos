name: Regenerar manualmente o HTML

on:
  workflow_dispatch:  # Permite execução manual / Allows manual execution

jobs:
  gerar-html:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Necessário para fazer commit / Required to commit

    steps:
      - name: Baixar repositório / Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Python / Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências / Install dependencies
        # beautifulsoup4 é necessário para rodar scripts do projeto se algum importar bs4
        run: pip install -r requirements.txt

      - name: Executar gerador de HTML / Run HTML generator
        run: python report.py

      - name: Salvar resultados / Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html history/
          git diff --cached --quiet || git commit -m "auto: regenerar HTML manualmente $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
